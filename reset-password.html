<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Green Table</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #f4f9f4; min-height: 100vh; display: flex;
           align-items: center; justify-content: center; padding: 20px; }
    .card { background: white; border-radius: 20px; padding: 40px 36px;
            max-width: 400px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.1); text-align: center; }
    .logo { font-size: 3rem; margin-bottom: 8px; }
    h1 { font-size: 1.6rem; font-weight: 800; color: #2e7d32; margin-bottom: 6px; }
    p { color: #777; font-size: 0.9rem; margin-bottom: 24px; line-height: 1.5; }
    input { width: 100%; padding: 13px 16px; border: 1.5px solid #ddd; border-radius: 10px;
            font-size: 0.95rem; margin-bottom: 12px; outline: none; font-family: inherit;
            transition: border-color .15s; }
    input:focus { border-color: #2e7d32; }
    button { width: 100%; padding: 14px; background: #2e7d32; color: white; border: none;
             border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer;
             transition: background .15s; margin-top: 4px; }
    button:hover { background: #1b5e20; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .error { color: #e53e3e; font-size: 0.85rem; margin-top: 10px; padding: 10px 14px;
             background: #fff5f5; border-radius: 8px; display: none; }
    .error.show { display: block; }
    .success { color: #2e7d32; font-size: 0.9rem; margin-top: 16px; line-height: 1.6; }
    .back { display: inline-block; margin-top: 20px; color: #2e7d32; text-decoration: none;
            font-size: 0.85rem; font-weight: 600; }
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="logo">🔒</div>
  <h1>Set New Password</h1>
  <p>Choose a new password for your Green Table account</p>
  <input type="password" id="p1" placeholder="New password (min 6 characters)" autocomplete="new-password" />
  <input type="password" id="p2" placeholder="Confirm new password" autocomplete="new-password" />
  <button id="btn" onclick="resetPassword()">Update Password</button>
  <div class="error" id="err"></div>
</div>

<script>
  const SUPABASE_URL = 'https://qcwtbawegbviazqegpta.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_chTRjscSEK1AJsS5BngDRQ_Cy8ThB34';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Exchange the code from the URL for a valid session
  async function init() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    if (code) {
      const { error } = await db.auth.exchangeCodeForSession(code);
      if (error) showError('Reset link is invalid or has expired. Please request a new one.');
    } else {
      // Fallback: check if already in recovery session via hash
      const { data: { session } } = await db.auth.getSession();
      if (!session) {
        showError('No reset token found. Please request a new password reset link.');
      }
    }
  }

  async function resetPassword() {
    const p1 = document.getElementById('p1').value;
    const p2 = document.getElementById('p2').value;
    const err = document.getElementById('err');
    err.classList.remove('show');

    if (p1.length < 6) { showError('Password must be at least 6 characters.'); return; }
    if (p1 !== p2)     { showError('Passwords do not match.'); return; }

    const btn = document.getElementById('btn');
    btn.disabled = true;
    btn.textContent = 'Updating...';

    const { error } = await db.auth.updateUser({ password: p1 });
    if (error) {
      btn.disabled = false;
      btn.textContent = 'Update Password';
      showError(error.message);
    } else {
      document.getElementById('card').innerHTML = `
        <div class="logo">✅</div>
        <h1>Password updated!</h1>
        <p class="success">Your password has been changed successfully.</p>
        <a class="back" href="index.html">← Go to Green Table</a>`;
    }
  }

  function showError(msg) {
    const el = document.getElementById('err');
    el.textContent = msg;
    el.classList.add('show');
  }

  init();
</script>
</body>
</html>
